<body class="bg-[#dcedff]">
    <header class="">
<div class="bg-[#FFFFFF] rounded-2xl mx-auto md:w-[520px] sm:vw-[520px] sm:vh-[743px] p-8 space-y-6">
            <div class="mx-auto space-y-6 text-center">
            <img src="./assets/github-logo.png" alt="" class="mx-auto">
            <div class="gap-1 text-center">
                <h2 class="text-4xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
            <p>Sign in to manage your issues</p>
            </div>
        </div>
        <fieldset class="fieldset mx-auto  rounded-box p-4">
  <label class="label text-[16px] text-[#1F2937] font-medium">Username</label>
  <input id="username" type="text" class="input md:w-12/12 sm:w-12/12" placeholder="Enter Username" />

  <label class="label text-[16px] text-[#1F2937] font-medium">Password</label>
  <input id="password" type="password" class="input md:w-12/12 sm:w-12/12" placeholder="Enter Password" />

  <button href="" onclick="logingBtn()" class="btn bg-[#4A00FF] text-white rounded mt-4">Login</button>
</fieldset>
<div class="flex items-center gap-2">
    <hr class="w-[45%] text-[#E4E4E7]">
    <p>OR</p>
    <hr class="w-[45%] text-[#E4E4E7]">
</div>
<div><p class="text[14px] text-[#64748B] text-center">Demo Credentials:</p></div>
</div>
    </header>

    <script src="./script.js"></script>
